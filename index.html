<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zoom Wait Screen</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <div class="title-bar">
      <span class="title-bar-title">Zoom Wait Screen</span>
      <button class="title-bar-close" onclick="require('electron').ipcRenderer.invoke('quit-app')">✕</button>
    </div>

    <div class="mode-selector">
      <button class="mode-btn active" data-mode="away">Away Message</button>
      <button class="mode-btn" data-mode="countdown">Countdown Timer</button>
    </div>

    <div id="away-fields" class="fields">
      <label for="message">Your message</label>
      <textarea id="message" placeholder="Enter your message..."></textarea>
    </div>

    <div id="countdown-fields" class="fields hidden">
      <label for="countdown-label-input">Label</label>
      <input type="text" id="countdown-label-input" value="The meeting will start in">

      <div class="time-options">
        <div class="radio-row">
          <label class="radio-label">
            <input type="radio" name="time-mode" value="minutes" checked>
            In
          </label>
          <input type="number" id="minutes-input" min="1" max="999" value="15">
          <span class="unit">minutes</span>
        </div>
        <div class="radio-row">
          <label class="radio-label">
            <input type="radio" name="time-mode" value="time">
            At exact time
          </label>
          <input type="time" id="time-input" disabled>
        </div>
      </div>
    </div>

    <div class="section">
      <label>Background Image</label>
      <div class="bg-picker">
        <button id="choose-bg">Choose Image</button>
        <span id="bg-filename">No image selected</span>
      </div>
      <div id="bg-preview" class="hidden"></div>
    </div>

    <div class="section">
      <label>Display Size</label>
      <div class="size-presets">
        <button class="preset-btn active" data-w="1280" data-h="720">1280×720</button>
        <button class="preset-btn" data-w="1920" data-h="1080">1920×1080</button>
      </div>
      <div class="size-inputs">
        <input type="number" id="width-input" value="1280" min="400" max="3840">
        <span>×</span>
        <input type="number" id="height-input" value="720" min="300" max="2160">
        <span class="unit">px</span>
      </div>
    </div>

    <div id="error-msg" class="error hidden"></div>

    <button id="start-btn">Start Display</button>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
