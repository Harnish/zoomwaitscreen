<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zoom Wait Screen</title>
  <link rel="stylesheet" href="display.css">
</head>
<body>
  <div id="display">
    <div id="away-display" class="mode-display hidden">
      <p id="away-text"></p>
    </div>

    <div id="countdown-display" class="mode-display hidden">
      <p id="countdown-label"></p>
      <p id="countdown-timer"></p>
    </div>
  </div>

  <button id="back-btn">✕ Back to Settings</button>

  <script src="display.js"></script>
</body>
</html>
